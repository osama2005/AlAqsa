<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Marhey:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <canvas id="starfield"></canvas>

    <!-- ===== Login Card ===== -->
    <div class="login-wrapper">
        <div class="glass-card">
            <h1>تسجيل الدخول</h1>

            <form action="javascript:void(0)" onsubmit="login()">
                <div class="form-group">
                    <input type="text" placeholder="اسم المستخدم" id="username" autocomplete="username">
                    <i class="fas fa-user icon"></i>
                </div>

                <div class="form-group">
                    <input type="password" placeholder="كلمة المرور" id="password" autocomplete="current-password">
                    <i class="fas fa-lock icon"></i>
                    <button type="button" class="toggle-pass" onclick="togglePass()" id="togglePassBtn" tabindex="-1" aria-label="إظهار/إخفاء كلمة المرور">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="options-row">
                    <label class="remember">
                        <input type="checkbox" checked>
                        تذكرني
                    </label>
                </div>

                <div id="errorMsg" class="form-error"></div>

                <button type="submit" class="login-btn">دخول</button>
            </form>
        </div>
    </div>

    <!-- ===== Success Overlay - Lamp Effect ===== -->
    <div class="success-overlay" id="successOverlay">
        <div class="lamp-wrap">
            <div class="lamp-conic-r">
                <div class="mask-b"></div>
                <div class="mask-l"></div>
            </div>
            <div class="lamp-conic-l">
                <div class="mask-b"></div>
                <div class="mask-r"></div>
            </div>
            <div class="lamp-blur-bg"></div>
            <div class="lamp-blur-overlay"></div>
            <div class="lamp-glow"></div>
            <div class="lamp-glow-intense" id="lampGlowIntense"></div>
            <div class="lamp-line" id="lampLine"></div>
            <div class="lamp-spacer"></div>
        </div>
        <div class="success-content">
            <div class="success-check"><i class="fas fa-check"></i></div>
            <div class="success-text">تم التسجيل</div>
            <div class="success-sub">جاري تحويلك...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
