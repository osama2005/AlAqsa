<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-overlay" id="themeOverlay"></div>
    <div class="bg-overlay" id="bgOverlay"></div>
    <div id="liveClock" class="login-clock"></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i> الوضع الليلي</button>
    <div class="login-box">
        <h2><i class="fas fa-lock"></i> تسجيل الدخول</h2>
        <p class="login-subtitle">أدخل اسم المستخدم</p>
        <div class="input-group">
            <div class="input-wrap">
                <input type="password" id="username" placeholder="اسم المستخدم" autocomplete="off">
                <button type="button" class="toggle-vis" onclick="toggleUserVis()" id="toggleUserBtn" title="إظهار/إخفاء"><i class="fas fa-eye"></i></button>
            </div>
        </div>
        <button onclick="login()">دخول</button>
        <p class="error" id="errorMsg"></p>
        <div style="display:flex;gap:6px;margin-top:14px;justify-content:center;flex-wrap:wrap">
            <div class="bg-dropdown">
                <button class="theme-btn" onclick="toggleBgDropdown()" id="bgBtn" title="تغيير الخلفية" style="margin-top:0"><i class="fas fa-image"></i></button>
                <div class="bg-dropdown-menu" id="bgMenu">
                    <div class="bg-grid">
                        <button onclick="setBg('default')" data-bg="default"><span class="bg-dot" style="border:2px dashed #bbb"></span> بدون</button>
                        <button onclick="setBg('earth')" data-bg="earth"><span class="bg-dot" style="background:#2d7d46"></span> الأرض</button>
                        <button onclick="setBg('mars')" data-bg="mars"><span class="bg-dot" style="background:#c0392b"></span> المريخ</button>
                        <button onclick="setBg('jupiter')" data-bg="jupiter"><span class="bg-dot" style="background:#d4a76a"></span> المشتري</button>
                        <button onclick="setBg('moon')" data-bg="moon"><span class="bg-dot" style="background:#95a5a6"></span> القمر</button>
                        <button onclick="setBg('mercury')" data-bg="mercury"><span class="bg-dot" style="background:#7f8c8d"></span> عطارد</button>
                        <button onclick="setBg('venus')" data-bg="venus"><span class="bg-dot" style="background:#e67e22"></span> الزهرة</button>
                        <button onclick="setBg('saturn')" data-bg="saturn"><span class="bg-dot" style="background:#d4a76a"></span> زحل</button>
                    </div>
                </div>
            </div>
            <a href="mailto:osamaandanes@gmail.com" class="support-btn" style="margin-top:0;display:inline-flex;align-items:center;gap:5px;padding:8px 14px"><i class="fas fa-envelope"></i> الدعم الفني</a>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
