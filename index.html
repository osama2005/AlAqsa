<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-overlay" id="themeOverlay"></div>
    <div class="login-box">
        <h2>🔐 تسجيل الدخول</h2>
        <p class="login-subtitle">أدخل اسم المستخدم</p>
        <div id="liveClock" class="live-clock"></div>
        <div class="input-group">
            <label>اسم المستخدم</label>
            <div class="input-wrap">
                <input type="password" id="username" placeholder="اسم المستخدم" autocomplete="off">
                <button type="button" class="toggle-vis" onclick="toggleUserVis()" id="toggleUserBtn" title="إظهار/إخفاء">👁️</button>
            </div>
        </div>
        <button onclick="login()">دخول</button>
        <p class="error" id="errorMsg"></p>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 الوضع الليلي</button>
        <a href="mailto:osamaandanes@gmail.com" class="support-btn">📧 التواصل مع الدعم الفني</a>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
